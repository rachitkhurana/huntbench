# Portal scanner config for Huntbench — copy to config/portals.yml and tune to YOUR search.
# `./jobsdb.py scan` pulls fresh openings from these companies' ATS boards (Greenhouse, Ashby,
# Lever, Workable, Recruitee, SmartRecruiters) — zero API keys, just public JSON endpoints.
# Edit title_filter / location_filter for your roles + geography, and grow tracked_companies
# (your agent can "add <company> to portals.yml" for you). The starter list below leans
# frontend/product-engineer — replace it with companies you care about.

# -- Location filter --
# Which locations to keep. Reorder / edit for your geography.
# India is ALLOWED (not blocked) — it surfaces but isn't prioritized.
location_filter:
  # Checked BEFORE allow/block — rescues multi-location posts naming home region.
  always_allow:
    - "United Arab Emirates"
    - "Abu Dhabi"
    - "Dubai"
    - "UAE"
    - "Remote"
  allow:
    - "Remote"
    - "United Arab Emirates"
    - "UAE"
    - "Dubai"
    - "Abu Dhabi"
    - "London"
    - "United Kingdom"
    - "Europe"
    - "EU"
    - "United States"
    - "USA"
    - "Australia"
    - "India"
    - "Bengaluru"
    - "Bangalore"
  # No block list — nothing is hard-rejected by location.

# -- Title filter --
# At least 1 positive must match AND 0 negatives (case-insensitive).
title_filter:
  positive:
    - "Frontend"
    - "Front End"
    - "Front-End"
    - "Fullstack"
    - "Full Stack"
    - "Full-Stack"
    - "Frontend Lead"
    - "Product Engineer"
    - "Forward Deployed"
    - "Deployed Engineer"
    - "UI Engineer"
    - "Web Engineer"
    - "Web Developer"
    - "React"
    - "Next.js"
    - "Software Engineer"
    - "Software Developer"
  negative:
    - "Junior"
    - "Intern"
    - "Internship"
    - "Graduate"
    - ".NET"
    - "Java "
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Mainframe"
    - "COBOL"
    - "QA"
    - "Backend"
    - "Back End"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"
    - "Tech Lead"

# -- Search queries --
# Each triggers a WebSearch. Tuned for frontend + UAE/remote.
search_queries:
  - name: Greenhouse — Senior/Lead Frontend (remote)
    query: 'site:job-boards.greenhouse.io "Frontend Engineer" OR "Frontend Lead" OR "Product Engineer" Senior OR Lead remote'
    enabled: true

  - name: Ashby — Senior/Lead Frontend (remote)
    query: 'site:jobs.ashbyhq.com "Frontend Engineer" OR "Frontend Lead" OR "Product Engineer" Senior OR Lead remote'
    enabled: true

  - name: Lever — Senior/Lead Frontend (remote)
    query: 'site:jobs.lever.co "Frontend Engineer" OR "Frontend Lead" OR "Fullstack Engineer" Senior OR Lead remote'
    enabled: true

  - name: Forward Deployed Engineer (cross-portal)
    query: '"Forward Deployed Engineer" OR "Deployed Engineer" frontend OR fullstack site:job-boards.greenhouse.io OR site:jobs.ashbyhq.com OR site:jobs.lever.co'
    enabled: true

  - name: UAE / Dubai — Frontend & Product Engineer
    query: '"Frontend Engineer" OR "Frontend Lead" OR "Product Engineer" Dubai OR "Abu Dhabi" OR UAE'
    enabled: true

  - name: WeWorkRemotely — Frontend
    query: 'site:weworkremotely.com "Frontend" OR "Full Stack" OR "Product Engineer" Senior OR Lead'
    enabled: true

  - name: YC / Work at a Startup — Frontend & Founding
    query: 'site:workatastartup.com "Frontend Engineer" OR "Product Engineer" OR "Founding Engineer" remote'
    enabled: true

